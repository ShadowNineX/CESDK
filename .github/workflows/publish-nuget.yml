name: Publish NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Pack and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Version '$version' is not a valid NuGet package version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore CESDK.sln

      - name: Pack
        run: dotnet pack CESDK.csproj -c Release --no-restore -o artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: artifacts/*

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ShadowNineX

      - name: Publish to NuGet
        shell: pwsh
        run: |
          Get-ChildItem -Path artifacts -Filter "*.nupkg" | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
